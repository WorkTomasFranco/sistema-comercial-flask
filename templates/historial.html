<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Historial - Sistema Comercial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Sistema Comercial</a>
    <div>
      <a class="btn btn-outline-light me-2" href="/productos">Productos</a>
      <a class="btn btn-outline-light me-2" href="/ventas">Ventas</a>
      <a class="btn btn-outline-light me-2" href="/reportes">Reportes</a>
      <a class="btn btn-outline-light" href="/historial">Historial</a>
    </div>
  </div>
</nav>

<h1 class="mb-4">Historial de Ventas</h1>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Fecha</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Ganancia</th>
        </tr>
    </thead>
    <tbody>
        {% for item in historial %}
        <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td>${{ item[3] }}</td>
            <td>${{ item[4] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
